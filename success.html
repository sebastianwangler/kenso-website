<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — KENSO</title>
<link rel="icon" type="image/png" href="icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #f0f7f4 0%, #ffffff 100%);
    color: #333;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 50px 60px;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 12px 50px rgba(0,0,0,0.06);
  }
  .icon {
    width: 80px; height: 80px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(43,58,69,0.12);
    margin-bottom: 24px;
  }
  .check {
    width: 64px; height: 64px;
    background: #58B99D;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .check svg { width: 32px; height: 32px; stroke: white; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-size: 1.8rem; font-weight: 700; color: #2B3A45; margin-bottom: 12px; }
  p { font-size: 1rem; line-height: 1.7; color: #666; margin-bottom: 12px; }
  .steps { text-align: left; margin: 20px 0; padding: 20px; background: #f8fafb; border-radius: 12px; }
  .steps li { padding: 6px 0; color: #555; font-size: 0.95rem; }
  .steps li strong { color: #2B3A45; }
  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: #2B3A45;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .btn:hover { background: #1d2d36; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(43,58,69,0.25); }
  .note { font-size: 0.85rem; color: #999; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
  </div>
  <h1>Thank you!</h1>
  <p>Your KENSO lifetime license has been activated.</p>
  <p>A confirmation with your license key has been sent to your email.</p>
  <ol class="steps">
    <li>Open <strong>KENSO</strong></li>
    <li>Go to the <strong>Info</strong> tab</li>
    <li>Enter your license key under <strong>License</strong></li>
    <li>Click <strong>Activate</strong></li>
  </ol>
  <a href="https://kenso.shop" class="btn">Back to kenso.shop</a>
  <p class="note">Need help? Contact <a href="mailto:support@kenso.shop" style="color: #58B99D; text-decoration: none;">support@kenso.shop</a></p>
</div>
</body>
</html>
